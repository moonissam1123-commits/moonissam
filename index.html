<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명의 친구 찾기 - 의사결정 트리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .tree-node {
            transition: all 0.3s ease;
        }
        .student-tag {
            display: inline-block;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 2px 6px;
            margin: 2px;
            font-size: 0.75rem;
        }
        .connector {
            width: 2px;
            background: #cbd5e1;
            margin: 0 auto;
            height: 20px;
        }
        .group-card {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 1rem;
            min-height: 100px;
        }
        .group-size-ok { border-color: #10b981; background-color: #ecfdf5; }
        .group-size-bad { border-color: #ef4444; background-color: #fef2f2; }
        .group-size-warn { border-color: #f59e0b; background-color: #fffbeb; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🤝 고2 운명의 친구 찾기 시스템</h1>
            <p class="text-gray-600">스프레드시트 응답 데이터를 기반으로 팀을 자동 배정합니다.</p>
        </header>

        <!-- 컨트롤 패널 -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 flex flex-wrap items-center justify-between gap-4">
            <div class="flex gap-4 items-center">
                <div id="status" class="text-base font-bold text-blue-600">스프레드시트 데이터를 분석하는 중입니다...</div>
            </div>
            <div class="flex gap-2">
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> 2~3명(완벽)</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-500 rounded-full"></span> 1명 또는 4명</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-red-500 rounded-full"></span> 재분류 필요</span>
            </div>
        </div>

        <!-- 시각화 영역 -->
        <div id="treeContainer" class="space-y-12">
            <!-- 질문별 레벨이 여기에 렌더링됩니다 -->
            <div id="rootNode" class="flex justify-center">
                <div class="bg-white p-6 rounded-2xl shadow-md border-2 border-blue-200 text-center w-full max-w-sm">
                    <h3 class="font-bold text-lg mb-2">전체 학생 (31명)</h3>
                    <div id="initialNames" class="flex flex-wrap justify-center overflow-y-auto max-h-32">
                        <!-- 초기 명단 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 최종 팀 결과 -->
        <div id="finalResults" class="mt-16 hidden">
            <h2 class="text-2xl font-bold text-center mb-8">✨ 최종 확정된 팀 명단</h2>
            <div id="teamGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- 최종 팀 카드 -->
            </div>
        </div>

        <!-- 푸터 추가 -->
        <footer class="mt-16 pb-8 text-center text-gray-400 text-sm border-t border-gray-200 pt-8">
            <p>&copy; 2026 함현고등학교. All rights reserved.</p>
            <p class="mt-1">Developed by 강문희</p>
        </footer>
    </div>

    <script>
        // 스프레드시트 설정 (CSV 배포 URL)
        // 주의: 스프레드시트에서 '파일 > 공유 > 웹에 게시 > 전체 문서(또는 시트1)를 CSV로 선택' 후 얻은 URL을 사용해야 합니다.
        const SHEET_ID = '1SHjvFSY6I8feE3Ts5LHEcJJkdv8OTmhaXlsZSwrQTHU';
        const GID = '838320863';
        
        // 데이터를 더 안정적으로 가져오기 위해 Google Visualization API 엔드포인트 사용
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

        let students = [];
        const questions = ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6'];

        const statusText = document.getElementById('status');
        const treeContainer = document.getElementById('treeContainer');
        const teamGrid = document.getElementById('teamGrid');
        const finalResults = document.getElementById('finalResults');

        // 페이지 로드 시 자동으로 데이터 가져오기 및 트리 렌더링 실행
        window.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            statusText.innerText = "데이터 파싱 중...";
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error("네트워크 응답 오류 (접근 권한 문제일 수 있습니다.)");
                
                const csvData = await response.text();
                
                // 스프레드시트가 비공개 상태이면 HTML 로그인 페이지가 반환됨
                if (csvData.trim().startsWith('<!DOCTYPE html>')) {
                    throw new Error("스프레드시트가 비공개 상태입니다.");
                }

                Papa.parse(csvData, {
                    header: false, // 헤더 이름에 의존하지 않고 0번째, 1번째 등의 열 인덱스로 접근
                    skipEmptyLines: true,
                    complete: (results) => {
                        processStudents(results.data);
                    },
                    error: (err) => {
                        throw new Error("CSV 파싱 에러");
                    }
                });
            } catch (e) {
                console.error(e);
                statusText.innerHTML = `<span class="text-red-600">오류: ${e.message} <br>💡 <b>해결방법: 스프레드시트 우측 상단 [공유] ➔ [일반 액세스: 링크가 있는 모든 사용자(뷰어)]</b>로 변경해주세요!<br>(현재는 테스트를 위해 가상의 임시 데이터로 화면을 구성합니다.)</span>`;
                loadFallbackData();
            }
        }

        function processStudents(data) {
            const rows = data.slice(1); // 첫 줄(헤더) 제외
            
            // 보통 0열: 타임스탬프, 1열: 이름, 2~7열: 답변이라고 가정
            students = rows.filter(row => row.length >= 3 && row[1]).map(row => ({
                name: row[1].replace(/\"/g, "").trim(), // 따옴표 및 공백 제거
                answers: [
                    row[2] || "",
                    row[3] || "",
                    row[4] || "",
                    row[5] || "",
                    row[6] || "",
                    row[7] || ""
                ]
            }));

            if (students.length === 0) {
                throw new Error("유효한 이름 데이터를 찾지 못했습니다.");
            }

            statusText.innerHTML = `<span class="text-green-600">${students.length}명의 데이터를 성공적으로 불러왔습니다.</span>`;
            renderTree();
        }

        function loadFallbackData() {
            // 구글 시트 권한 오류 등으로 데이터를 못 가져올 때 화면이 멈추지 않도록 가상의 데이터 생성
            students = Array.from({length: 31}, (_, i) => ({
                name: `테스트학생${i+1}`,
                answers: Array.from({length: 6}, () => Math.random() > 0.5 ? 'A' : 'B')
            }));
            renderTree();
        }

        function renderTree() {
            // 초기화
            treeContainer.innerHTML = '';
            
            // 트리 구조 구축
            let currentGroups = [{
                path: [],
                members: students,
                title: "전체"
            }];

            // 질문 단계별로 진행 (최대 6단계)
            for (let i = 0; i < questions.length; i++) {
                const levelDiv = document.createElement('div');
                levelDiv.className = "space-y-4";
                
                const questionTitle = document.createElement('h3');
                questionTitle.className = "text-center font-semibold text-blue-500 uppercase tracking-widest";
                questionTitle.innerText = `Step ${i+1}: ${questions[i]}`;
                levelDiv.appendChild(questionTitle);

                const groupContainer = document.createElement('div');
                groupContainer.className = "flex flex-wrap justify-center gap-4";
                
                let nextGroups = [];
                let hasSplittableGroups = false;

                currentGroups.forEach(group => {
                    // 이미 2~3명이면 더 나누지 않음 (선택사항)
                    if (group.members.length <= 3 && group.members.length >= 2) {
                        nextGroups.push(group);
                        renderGroup(groupContainer, group, false);
                    } else if (group.members.length > 3) {
                        hasSplittableGroups = true;
                        // 질문에 따라 분리
                        const choiceA = [];
                        const choiceB = [];
                        
                        // 해당 질문에 대한 응답값 기준으로 분리
                        // 실제 응답 텍스트가 다를 수 있으므로 첫 번째 사람의 대답을 기준으로 A/B를 임의 지정
                        const firstAnswer = group.members[0].answers[i];
                        
                        group.members.forEach(m => {
                            if (m.answers[i] === firstAnswer) choiceA.push(m);
                            else choiceB.push(m);
                        });

                        if (choiceA.length > 0) {
                            nextGroups.push({ path: [...group.path, 'A'], members: choiceA, title: `Q${i+1}:A` });
                        }
                        if (choiceB.length > 0) {
                            nextGroups.push({ path: [...group.path, 'B'], members: choiceB, title: `Q${i+1}:B` });
                        }
                        
                        renderGroup(groupContainer, group, true);
                    } else {
                        nextGroups.push(group);
                        renderGroup(groupContainer, group, false);
                    }
                });

                levelDiv.appendChild(groupContainer);
                treeContainer.appendChild(levelDiv);
                
                currentGroups = nextGroups;
                
                // 만약 더 이상 나눌 그룹이 없으면 중단
                if (!hasSplittableGroups) break;
            }

            renderFinalTeams(currentGroups);
        }

        function renderGroup(container, group, isParent) {
            const div = document.createElement('div');
            const count = group.members.length;
            let statusClass = "group-size-warn";
            if (count >= 2 && count <= 3) statusClass = "group-size-ok";
            else if (count > 3 || count < 2) statusClass = "group-size-bad";

            div.className = `group-card ${statusClass} bg-white shadow-sm w-48 text-center transition-all hover:scale-105`;
            div.innerHTML = `
                <div class="text-xs font-bold text-gray-400 mb-1">${group.title || '그룹'}</div>
                <div class="text-2xl font-black mb-2">${count}명</div>
                <div class="flex flex-wrap justify-center">
                    ${group.members.slice(0, 3).map(m => `<span class="student-tag">${m.name}</span>`).join('')}
                    ${count > 3 ? `<span class="text-xs text-gray-400 mt-1">외 ${count-3}명</span>` : ''}
                </div>
            `;
            container.appendChild(div);
        }

        function renderFinalTeams(groups) {
            finalResults.classList.remove('hidden');
            teamGrid.innerHTML = '';
            
            groups.forEach((group, idx) => {
                const card = document.createElement('div');
                const count = group.members.length;
                
                let bgColor = "bg-white";
                let borderColor = "border-gray-200";
                let badgeText = "인원 조정 권장";
                let badgeClass = "bg-yellow-100 text-yellow-700";

                if (count >= 2 && count <= 3) {
                    borderColor = "border-green-500";
                    badgeText = "매칭 완료";
                    badgeClass = "bg-green-100 text-green-700";
                }

                card.className = `bg-white rounded-2xl shadow-lg border-t-4 ${borderColor} p-6 flex flex-col`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h4 class="text-xl font-bold text-gray-800">${idx + 1}팀</h4>
                        <span class="px-2 py-1 rounded text-xs font-bold ${badgeClass}">${badgeText}</span>
                    </div>
                    <ul class="space-y-2 flex-grow mb-4">
                        ${group.members.map(m => `
                            <li class="flex items-center gap-2 text-gray-700">
                                <div class="w-2 h-2 bg-blue-400 rounded-full"></div>
                                ${m.name}
                            </li>
                        `).join('')}
                    </ul>
                    <div class="text-xs text-gray-400 italic">
                        공통점: ${group.path.join(' → ') || '운명의 만남'}
                    </div>
                `;
                teamGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
